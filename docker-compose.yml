services:
  mysql:
    image: mysql:8.4
    container_name: marketplace-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: marketplace_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - marketplace-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/marketplace_db
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8082:8080"

volumes:
  marketplace-mysql-data:
