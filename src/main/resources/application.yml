spring:
  application:
    name: ecommerce-marketplace-api

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/marketplace_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:4zxKaWuax9yi/e/imAWYfgoCWKTJuUB+yBA8K2aT2u0=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

admin:
  seed:
    email: ${ADMIN_SEED_EMAIL:admin@marketplace.com}
    password: ${ADMIN_SEED_PASSWORD:ChangeMe123!}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.marketplace: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"
